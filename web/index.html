<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIT Chennai AI Assistant</title>
  <style>
    :root { color-scheme: light; --bg:#ffffff; --surface:#ffffff; --muted:#64748b; --text:#0b1020; --accent:#111827; --accent-2:#111827; --ring: rgba(2,6,23,.12); }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; color: var(--text); background: var(--bg); }
    .container { max-width: 920px; margin: 0 auto; padding: 24px; min-height: 100dvh; display: flex; flex-direction: column; }
    .header { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:12px 16px; background: var(--surface); border:1px solid #e5e7eb; border-radius: 10px; }
    .brand { display:flex; align-items:center; gap:10px; }
    .logo { width: 28px; height: 28px; border-radius:6px; background: #111827; }
    .title { margin:0; font-size:16px; font-weight:600; letter-spacing:.2px; }
    .subtitle { margin:0; font-size:12px; color: var(--muted); }
    .config { display:flex; gap:10px; align-items:center; flex-wrap: wrap; }
    .input { background:#ffffff; color:var(--text); border:1px solid #e5e7eb; padding:10px 12px; border-radius:10px; outline: none; }
    .input:focus { border-color: #111827; box-shadow: 0 0 0 3px rgba(17,24,39,.12); }
    .input.small { width: 96px; }

    .chat { position: relative; margin-top: 16px; flex: 1; display:flex; flex-direction:column; gap: 16px; background: var(--surface); border:1px solid #e5e7eb; border-radius: 12px; overflow: hidden; }
    .messages { padding: 18px; overflow-y: auto; display:flex; flex-direction:column; gap: 14px; scroll-behavior: smooth; }
    .bubble { max-width: 80%; padding: 12px 14px; border-radius: 14px; white-space: pre-wrap; line-height: 1.45; }
    .bubble.user { align-self: flex-end; background: #0b0b0b; color: #ffffff; border:1px solid #0b0b0b; }
    .bubble.bot { align-self: flex-start; background: #ffffff; color: #0b1020; border:1px solid #e5e7eb; }
    .meta { margin-top: 8px; font-size: 12px; color: var(--muted); }
    .sources { display: none; margin-top: 8px; padding: 10px; border-radius: 8px; background: #f8fafc; border:1px dashed #e5e7eb; color:#0b1020; font-size: 12px; }
    .sources.show { display:block; }

    .composer { display:flex; gap: 10px; padding: 12px; border-top: 1px solid #e5e7eb; background: var(--surface); }
    .textbox { flex:1; resize:none; min-height: 44px; max-height: 160px; padding: 12px 14px; border-radius: 12px; border:1px solid #e5e7eb; background:#ffffff; color: var(--text); outline: none; }
    .textbox:focus { border-color: #111827; box-shadow: 0 0 0 3px rgba(17,24,39,.12); }
    .btn { height: 44px; padding: 0 14px; border-radius: 10px; border: 1px solid #e5e7eb; background: #111827; color: #ffffff; font-weight: 600; letter-spacing:.1px; cursor: pointer; }
    .btn:disabled { opacity: .7; cursor: not-allowed; }
    .btn.secondary { background: #ffffff; color: #0b1020; border:1px solid #e5e7eb; }

    .toolbar { display:flex; gap: 8px; align-items:center; }
    .pill { font-size: 12px; padding: 6px 10px; border-radius: 999px; border:1px solid #e5e7eb; background:#ffffff; color: var(--muted); }

    @media (max-width: 640px) {
      .bubble { max-width: 92%; }
      .container { padding: 16px; }
      .config .input.small { width: 80px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <p class="title">VIT Chennai AI Assistant</p>
          <p class="subtitle">Ask about campus, academics, and more — locally</p>
        </div>
      </div>
      <div class="config">
        <input id="api" class="input" type="text" value="http://localhost:8000/query" placeholder="API URL" />
        <input id="topk" class="input small" type="number" min="1" max="10" value="3" placeholder="Top K" />
        <button id="clear" class="btn secondary">Clear</button>
      </div>
    </div>

    <div class="chat">
      <div id="messages" class="messages"></div>
      <div class="composer">
        <textarea id="q" class="textbox" placeholder="Ask anything about your documents..." rows="1"></textarea>
        <div class="toolbar">
          <span class="pill">Enter ↵ to send</span>
          <button id="ask" class="btn">Send</button>
        </div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
